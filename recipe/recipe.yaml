schema_version: 1

context:
  version: "0.9.7"

package:
  name: fps-nbconvert
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-nbconvert/fps_nbconvert-${{ version }}.tar.gz
    sha256: f22a40bff9b01aaec0c9172942ea82bce5ce03f5779e94f5f3473dda3c9cdfa2

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.14.0,<0.15.0
    - nbconvert

tests:
  - python:
      imports: fps_nbconvert
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/nbconvert
  summary: An FPS plugin for the nbconvert API

extra:
  recipe-maintainers:
    - davidbrochart
